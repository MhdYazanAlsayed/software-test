services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: datefinder-db
    ports:
      - "1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Express"
      TZ: "Europe/Bucharest"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build: .
    container_name: datefinder
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Server=db,1433;Database=WebsiteDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      - Monitoring__Password=${MONITORING_PASSWORD-MyP@ssw0rd}
      - Origions=http://localhost:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: datefinder-nginx
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/site/index.html:/etc/nginx/html/index.html
      - ./nginx/site/app.js:/etc/nginx/html/app.js
    depends_on:
      web:
        condition: service_healthy

volumes:
  mssql_data:
