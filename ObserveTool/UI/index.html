<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h2 class="mb-4">Monitoring Dashboard</h2>

    <div class="row mb-4">
        <div class="col">
            <div class="card text-bg-danger">
                <div class="card-body">
                    <h5>Errors (1 day)</h5>
                    <h3 id="errorCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card text-bg-info">
                <div class="card-body">
                    <h5>Information (1 day)</h5>
                    <h3 id="infoCount">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <select id="levelFilter" class="form-select w-25">
            <option value="">All Levels</option>
            <option value="Error">Error</option>
            <option value="Information">Information</option>
            <option value="Warning">Warning</option>
        </select>
    </div>

    <table class="table table-bordered table-sm">
        <thead>
            <tr>
                <th>Date</th>
                <th>Level</th>
                <th>Category</th>
                <th>Message</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="logTable"></tbody>
    </table>

    <nav class="d-flex align-items-center gap-2">

        <button class="btn btn-outline-primary btn-sm" id="prevBtn">
            Previous
        </button>

        <div class="d-flex align-items-center gap-1">
            <span>Page</span>
            <input type="number" id="pageInput"
                   class="form-control form-control-sm"
                   style="width:80px;">
            <span id="totalPagesText"></span>
        </div>

        <button class="btn btn-outline-primary btn-sm" id="nextBtn">
            Next
        </button>

    </nav>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 20;

        async function loadStats() {
            const res = await fetch("/monitoring/api/stats");
            const data = await res.json();

            document.getElementById("errorCount").innerText = data.errors;
            document.getElementById("infoCount").innerText = data.informations;
        }

        async function loadLogs(page = 1) {

            const level = document.getElementById("levelFilter").value;
            let url = `/monitoring/api/logs?page=${page}&pageSize=${pageSize}`;

            if (level)
                url += `&level=${level}`;

            const res = await fetch(url);
            const result = await res.json();

            currentPage = page;
            totalPages = Math.ceil(result.total / result.pageSize);

            updatePaginationUI();

            const table = document.getElementById("logTable");
            table.innerHTML = "";

            result.data.forEach(log => {
                table.innerHTML += `
            <tr>
                <td>${new Date(log.timestamp).toLocaleString()}</td>
                <td>${log.levelText}</td>
                <td>${log.category}</td>
                <td>${log.message}</td>
                <td>${log.statusCode ?? ""}</td>
            </tr>`;
            });
        }

        function updatePaginationUI() {

            document.getElementById("pageInput").value = currentPage;
            document.getElementById("totalPagesText").innerText = `of ${totalPages}`;

            document.getElementById("prevBtn").disabled = currentPage <= 1;
            document.getElementById("nextBtn").disabled = currentPage >= totalPages;
        }

        document.getElementById("prevBtn").addEventListener("click", () => {
            if (currentPage > 1)
                loadLogs(currentPage - 1);
        });

        document.getElementById("nextBtn").addEventListener("click", () => {
            if (currentPage < totalPages)
                loadLogs(currentPage + 1);
        });

        document.getElementById("pageInput").addEventListener("change", (e) => {

            let page = parseInt(e.target.value);

            if (isNaN(page) || page < 1 || page > totalPages) {
                e.target.value = currentPage;
                return;
            }

            loadLogs(page);
        });

        document.getElementById("levelFilter").addEventListener("change", () => {
            loadLogs(1);
        });

        loadStats();
        loadLogs();

    </script>

</body>
</html>
